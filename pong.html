<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden; /* Prevent scrolling within iframe */
    }
    
    #game-container {
      position: relative;
    }

    canvas {
      background-color: #111;
      border: 2px solid #333;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    #score-board {
      display: flex;
      justify-content: space-between;
      width: 480px;
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: bold;
    }
    
    .player-score {
      color: #00ff00;
    }
    
    .ai-score {
      color: #ff3333;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <div id="score-board">
      <span class="player-score">Player: <span id="playerScore">0</span></span>
      <span class="ai-score">Computer: <span id="aiScore">0</span></span>
    </div>
    
    <canvas id="pongCanvas" width="480" height="320"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");
    
    const playerScoreEl = document.getElementById("playerScore");
    const aiScoreEl = document.getElementById("aiScore");

    // Game objects
    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 6,
      speed: 4,
      dx: 4,
      dy: 4
    };

    const paddleWidth = 10;
    const paddleHeight = 60;

    const player = {
      x: 10,
      y: (canvas.height - paddleHeight) / 2,
      width: paddleWidth,
      height: paddleHeight,
      dy: 0,
      score: 0,
      speed: 6
    };

    const ai = {
      x: canvas.width - paddleWidth - 10,
      y: (canvas.height - paddleHeight) / 2,
      width: paddleWidth,
      height: paddleHeight,
      dy: 0,
      score: 0,
      speed: 4
    };

    // Keyboard state
    const keys = {
      ArrowUp: false,
      ArrowDown: false,
      w: false,
      s: false,
      W: false,
      S: false
    };

    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2, false);
      ctx.closePath();
      ctx.fill();
    }

    function drawText(text, x, y, color) {
      ctx.fillStyle = color;
      ctx.font = "30px Courier New";
      ctx.fillText(text, x, y);
    }

    function drawNet() {
      for (let i = 0; i <= canvas.height; i += 15) {
        drawRect(canvas.width / 2 - 1, i, 2, 10, "#555");
      }
    }

    function draw() {
      // Clear canvas
      drawRect(0, 0, canvas.width, canvas.height, "#111");
      
      // Draw net
      drawNet();

      // Draw paddles
      drawRect(player.x, player.y, player.width, player.height, "#00ff00");
      drawRect(ai.x, ai.y, ai.width, ai.height, "#ff3333");

      // Draw ball
      drawCircle(ball.x, ball.y, ball.radius, "#fff");
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speed = 4;
      ball.dx = -ball.dx; // Serve to the other player
    }

    function update() {
      // Move player paddle
      if (keys.ArrowUp || keys.w || keys.W) {
        player.y -= player.speed;
      } else if (keys.ArrowDown || keys.s || keys.S) {
        player.y += player.speed;
      }

      // Prevent player paddle from going out of bounds
      if (player.y < 0) {
        player.y = 0;
      } else if (player.y + player.height > canvas.height) {
        player.y = canvas.height - player.height;
      }

      // Simple AI logic: Follow the ball
      let aiCenter = ai.y + ai.height / 2;
      if (aiCenter < ball.y - 10) {
        ai.y += ai.speed;
      } else if (aiCenter > ball.y + 10) {
        ai.y -= ai.speed;
      }

      // Prevent AI paddle from going out of bounds
      if (ai.y < 0) {
        ai.y = 0;
      } else if (ai.y + ai.height > canvas.height) {
        ai.y = canvas.height - ai.height;
      }

      // Move the ball
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Ball collision with top & bottom walls
      if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
        ball.dy = -ball.dy;
      }

      // Ball collision with paddles
      let hitPaddle = (ball.x < canvas.width / 2) ? player : ai;

      // Check if ball is hitting the paddle
      if (
        ball.x - ball.radius < hitPaddle.x + hitPaddle.width &&
        ball.x + ball.radius > hitPaddle.x &&
        ball.y + ball.radius > hitPaddle.y &&
        ball.y - ball.radius < hitPaddle.y + hitPaddle.height
      ) {
        // Calculate where the ball hit the paddle
        let collidePoint = ball.y - (hitPaddle.y + hitPaddle.height / 2);
        
        // Normalize the value to be between -1 and 1
        collidePoint = collidePoint / (hitPaddle.height / 2);
        
        // Calculate angle (max 45 degrees or PI/4)
        let angleRad = collidePoint * Math.PI / 4;
        
        // Direction of ball based on which paddle was hit
        let direction = (ball.x < canvas.width / 2) ? 1 : -1;
        
        // Change velocity based on angle
        ball.dx = direction * ball.speed * Math.cos(angleRad);
        ball.dy = ball.speed * Math.sin(angleRad);
        
        // Increase speed slightly after every hit
        ball.speed += 0.5;
      }

      // Update score and reset ball if goes past left/right bounds
      if (ball.x - ball.radius < 0) {
        ai.score++;
        aiScoreEl.textContent = ai.score;
        resetBall();
      } else if (ball.x + ball.radius > canvas.width) {
        player.score++;
        playerScoreEl.textContent = player.score;
        resetBall();
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Keyboard event listeners
    document.addEventListener("keydown", (e) => {
      if (keys.hasOwnProperty(e.key)) {
        keys[e.key] = true;
        
        // Prevent default scrolling for arrow keys
        if (e.key === "ArrowUp" || e.key === "ArrowDown") {
          e.preventDefault();
        }
      }
    });

    document.addEventListener("keyup", (e) => {
      if (keys.hasOwnProperty(e.key)) {
        keys[e.key] = false;
        
        // Prevent default scrolling for arrow keys
        if (e.key === "ArrowUp" || e.key === "ArrowDown") {
          e.preventDefault();
        }
      }
    });

    // Start game loop
    gameLoop();
  </script>
</body>
</html>
